name: Verificar servidor MCP
on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Versión y features del servidor
        run: |
          echo "== initialize (serverInfo.version) =="
          curl -sS -m 120 -X POST https://markk-8o3o.onrender.com/mcp \
            -H 'Content-Type: application/json' \
            -d '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2025-06-18","capabilities":{},"clientInfo":{"name":"p","version":"1"}}}'
          echo ""
          echo "== ¿tools/list tiene las features nuevas? =="
          BODY=$(curl -sS -m 60 -X POST https://markk-8o3o.onrender.com/mcp \
            -H 'Content-Type: application/json' \
            -d '{"jsonrpc":"2.0","id":2,"method":"tools/list"}')
          for f in navegar dni buscarPaciente usuario clave; do
            if echo "$BODY" | grep -q "\"$f\"\|$f"; then echo "  ✔ $f PRESENTE"; else echo "  ✖ $f AUSENTE"; fi
          done
          echo ""
          echo "== esquema de cargar_en_sihosp =="
          echo "$BODY" | tr ',' '\n' | grep -A2 -i 'cargar_en_sihosp\|navegar\|dni' | head -40
